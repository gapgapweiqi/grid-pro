function setView(viewId) {
  state.currentView = viewId;
  document.querySelectorAll(".view").forEach((view) => {
    view.classList.toggle("is-active", view.dataset.view === viewId);
  });

  document.querySelectorAll(".nav-item").forEach((button) => {
    button.classList.toggle("is-active", button.dataset.view === viewId);
  });

  document.querySelectorAll(".bottom-item").forEach((button) => {
    button.classList.toggle("is-active", button.dataset.view === viewId);
  });

  const titleData = viewTitles[viewId] || {};
  const titleEl = document.getElementById("viewTitle");
  const subtitleEl = document.querySelector(".topbar-subtitle");
  if (titleEl) {
    titleEl.textContent = titleData.title || "";
  }
  if (subtitleEl) {
    subtitleEl.textContent = titleData.subtitle || "";
  }
}

function toggleSidebar() {
  const isMobile = window.innerWidth < 768;
  if (isMobile) {
    document.body.classList.toggle("sidebar-open");
  } else {
    document.body.classList.toggle("sidebar-collapsed");
  }
}

function openMobileSidebar() {
  document.body.classList.add("sidebar-open");
}

function closeMobileSidebar() {
  document.body.classList.remove("sidebar-open");
}

function hexToRgba(hex, alpha) {
  const value = hex.replace("#", "");
  const bigint = parseInt(value, 16);
  const r = (bigint >> 16) & 255;
  const g = (bigint >> 8) & 255;
  const b = bigint & 255;
  return `rgba(${r}, ${g}, ${b}, ${alpha})`;
}

function applyTheme(themeId) {
  const theme = state.themes.find((item) => item.id === themeId) || state.themes[0];
  if (!theme) {
    return;
  }
  document.documentElement.style.setProperty("--color-primary", theme.value);
  document.documentElement.style.setProperty("--color-primary-soft", hexToRgba(theme.value, 0.12));
}

function applyFont(fontId) {
  const font = state.fonts.find((item) => item.id === fontId) || state.fonts[0];
  if (!font) {
    return;
  }
  document.documentElement.style.setProperty("--font-body", font.css);
}

function safeLocalStorageGet(key) {
  try {
    return localStorage.getItem(key) || "";
  } catch (error) {
    return "";
  }
}

function safeLocalStorageSet(key, value) {
  try {
    localStorage.setItem(key, value);
  } catch (error) {}
}

function formatMoney(value) {
  const currency = state.settings["defaults.currency"] || state.defaults.currency || "THB";
  const number = Number(value || 0);
  try {
    return new Intl.NumberFormat("th-TH", {
      style: "currency",
      currency: currency,
      maximumFractionDigits: 2
    }).format(number);
  } catch (error) {
    return "฿" + number.toFixed(2);
  }
}

function showError(err) {
  const message = err && err.message ? err.message : String(err || "Unknown error");
  alert("เกิดข้อผิดพลาด: " + message);
}

function runServer(functionName) {
  const args = Array.prototype.slice.call(arguments, 1);
  return new Promise((resolve, reject) => {
    const runner = google.script.run.withSuccessHandler(resolve).withFailureHandler(reject);
    const serverFunc = runner ? runner[functionName] : null;
    if (typeof serverFunc !== "function") {
      reject(new Error("Unknown server function: " + functionName));
      return;
    }
    serverFunc.apply(runner, args);
  });
}

function initCompanySwitcher() {
  const select = document.getElementById("companySwitcher");
  if (!select) {
    return;
  }
  const companies = state.companies || [];
  select.innerHTML = "";
  if (!companies.length) {
    const option = document.createElement("option");
    option.textContent = "ยังไม่มีบริษัท";
    option.value = "";
    select.appendChild(option);
    select.disabled = true;
    state.companyId = "";
    safeLocalStorageSet("companyId", "");
    return;
  }
  select.disabled = false;
  companies.forEach((company) => {
    const option = document.createElement("option");
    option.textContent = company.name || company.companyName || "บริษัท";
    option.value = company.entityId || company.companyId || "";
    select.appendChild(option);
  });

  const stored = safeLocalStorageGet("companyId");
  if (stored && companies.some((item) => (item.entityId || item.companyId || "") === stored)) {
    select.value = stored;
  }

  if (!select.value) {
    select.value = companies[0].entityId || companies[0].companyId || "";
  }

  state.companyId = select.value || "";
  safeLocalStorageSet("companyId", state.companyId);

  select.onchange = () => {
    state.companyId = select.value || "";
    safeLocalStorageSet("companyId", state.companyId);
    refreshAll();
  };
}

async function refreshAll() {
  if (!state.companyId) {
    state.customers = [];
    state.products = [];
    state.salespersons = [];
    state.documents = [];
    state.unpaidDocs = [];
    state.kpi = {};
    state.salesTrend = [];
    renderAll();
    return;
  }

  try {
    const companyId = state.companyId;
    const [masterData, kpiData, unpaidDocs, salesTrend, documents] = await Promise.all([
      runServer("getMasterData", companyId),
      runServer("getKpiDataApi", companyId),
      runServer("getUnpaidDocumentsApi", companyId),
      runServer("getSalesTrendApi", companyId, 6),
      runServer("listDocumentsApi", companyId, null)
    ]);

    state.customers = masterData && masterData.customers ? masterData.customers : [];
    state.products = masterData && masterData.products ? masterData.products : [];
    state.salespersons = masterData && masterData.salespersons ? masterData.salespersons : [];
    state.kpi = kpiData || {};
    state.unpaidDocs = unpaidDocs || [];
    state.salesTrend = salesTrend || [];
    state.documents = documents || [];
    renderAll();
  } catch (error) {
    showError(error);
  }
}

}

function downloadTextFile(filename, content, mimeType) {
  const blob = new Blob([content], { type: mimeType || "text/plain;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.href = url;
  link.download = filename;
  document.body.appendChild(link);
  link.click();
  setTimeout(() => {
    URL.revokeObjectURL(url);
    link.remove();
  }, 0);
}

function pickFile(accept) {
  return new Promise((resolve, reject) => {
    const input = document.createElement("input");
    input.type = "file";
    input.accept = accept || "*/*";
    input.addEventListener(
      "change",
      () => {
        const file = input.files && input.files[0];
        if (!file) {
          reject(new Error("No file selected"));
          return;
        }
        resolve(file);
      },
      { once: true }
    );
    input.click();
  });
}

function readFileText(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(String(reader.result || ""));
    reader.onerror = () => reject(reader.error || new Error("Failed to read file"));
    reader.readAsText(file);
  });
}

async function exportCsv(entityType) {
  if (!ensureCompanySelected()) return;
  try {
    const result = await runServer("exportCsvApi", entityType, state.companyId);
    if (!result || !result.content) {
      alert("ไม่พบข้อมูลสำหรับส่งออก");
      return;
    }
    downloadTextFile(result.filename || "export.csv", result.content, "text/csv;charset=utf-8");
  } catch (error) {
    showError(error);
  }
}

async function importCsv(entityType) {
  if (!ensureCompanySelected()) return;
  try {
    const file = await pickFile(".csv,text/csv");
    const text = (await readFileText(file)).replace(/^\uFEFF/, "");
    const result = await runServer("importCsvApi", entityType, state.companyId, text, { mode: "UPSERT" });
    const errorLines = (result && result.errors ? result.errors : [])
      .slice(0, 5)
      .map((item) => "แถว " + item.row + ": " + item.message)
      .join("\n");
    alert(
      "นำเข้า CSV สำเร็จ\n" +
        "- inserted: " +
        (result.inserted || 0) +
        "\n- updated: " +
        (result.updated || 0) +
        "\n- skipped: " +
        (result.skipped || 0) +
        (errorLines ? "\n\nErrors:\n" + errorLines : "")
    );
    await refreshAll();
  } catch (error) {
    showError(error);
  }
}

async function saveCompany() {
  const editId = document.getElementById("companyEditId").value;
  const code = document.getElementById("companyCode").value;
  const name = document.getElementById("companyName").value;
  const taxId = document.getElementById("companyTaxId").value;
  const address = document.getElementById("companyAddress").value;
  const phone = document.getElementById("companyPhone").value;
  const email = document.getElementById("companyEmail").value;
  const status = document.getElementById("companyStatus").value;

  if (!name) {
    alert("กรุณากรอกชื่อบริษัท");
    return;
  }

  try {
    let logoUrl = companyLogoData || "";
    if (companyLogoData && companyLogoData.indexOf("data:") === 0) {
      // base64 → upload to Drive first
      const uploadRes = await runServer("uploadCompanyLogoApi", state.companyId, companyLogoData, null, "company_logo.png");
      logoUrl = uploadRes.url;
    }

    const companyJson = {};
    if (logoUrl) {
      companyJson.logo = logoUrl;
    }
    
    const result = await runServer("saveCompany", {
      entityId: editId || undefined,
      code: code || "",
      name: name,
      taxId: taxId || "",
      phone: phone || "",
      email: email || "",
      address: address || "",
      status: status,
      json: companyJson
    });
    state.companies = await runServer("listCompaniesApi");
    const createdId = result && result.record ? result.record.entityId : "";
    if (createdId && !editId) {
      state.companyId = createdId;
      safeLocalStorageSet("companyId", createdId);
      const switcher = document.getElementById("companySwitcher");
      if (switcher) {
        switcher.value = createdId;
      }
    }
    initCompanySwitcher();
    await refreshAll();
    document.getElementById("companyModal").style.display = "none";
  } catch (error) {
    console.error("saveCompany error:", error);
    alert("เกิดข้อผิดพลาด: " + (error.message || error));
  }
}

const docState = {
  items: [],
  nextItemId: 1,
  docNoEdited: false
};

function generateDocNumber(docType) {
  const config = DOC_CONFIG[docType] || DOC_CONFIG.QUO;
  const prefix = config.prefix;
  const now = new Date();
  const year = (now.getFullYear() + 543).toString().slice(-2);
  const month = String(now.getMonth() + 1).padStart(2, "0");
  const random = String(Math.floor(Math.random() * 10000)).padStart(4, "0");
  return `${prefix}${year}${month}-${random}`;
}

function updateDocTypeFields(docType) {
  const config = DOC_CONFIG[docType] || DOC_CONFIG.QUO;
  
  const docNoInput = document.getElementById("docNoInput");
  if (docNoInput && !docState.docNoEdited) docNoInput.value = generateDocNumber(docType);
  
  const dueDateWrapper = document.getElementById("docDueDateWrapper");
  const dueDateLabel = document.getElementById("docDueDateLabel");
  if (dueDateWrapper && dueDateLabel) {
    if (config.showDueDate || config.showValidUntil) {
      dueDateWrapper.style.display = "block";
      dueDateLabel.textContent = config.showValidUntil ? "ใช้ได้ถึง" : "วันครบกำหนด";
    } else {
      dueDateWrapper.style.display = "none";
    }
  }
  
  const customerLabel = document.getElementById("docCustomerLabel");
  if (customerLabel) {
    customerLabel.textContent = config.showVendor ? "ข้อมูลผู้ขาย" : "ข้อมูลลูกค้า";
  }
  
  const termsSection = document.getElementById("docTermsSection");
  if (termsSection) {
    termsSection.style.display = "block";

    const docOptPaymentTerms = document.getElementById("docOptPaymentTerms");
    const paymentTermsBlock = docOptPaymentTerms ? docOptPaymentTerms.closest("div") : null;
    if (paymentTermsBlock) {
      paymentTermsBlock.style.display = config.showPaymentTerms ? "block" : "none";
    }
  }
  
  const shipToSection = document.getElementById("docShipToSection");
  if (shipToSection) {
    shipToSection.style.display = config.showShipTo ? "block" : "none";
  }
}

function initDocumentPage() {
  const docTypeSelect = document.getElementById("docTypeSelect");
  if (docTypeSelect) {
    docTypeSelect.onchange = () => {
      docState.docNoEdited = false;
      updateDocTypeFields(docTypeSelect.value);
    };
    updateDocTypeFields(docTypeSelect.value || "QUO");
  }

  const docNoInput = document.getElementById("docNoInput");
  if (docNoInput) {
    docNoInput.addEventListener("input", () => {
      docState.docNoEdited = true;

function addDocItem(product) {
  const item = {
    id: docState.nextItemId++,
    productId: product ? product.entityId : "",
    name: product ? product.name : "",
    qty: 1,
    unit: product && product.json ? product.json.unit || "" : "",
    price: product && product.json ? product.json.price || 0 : 0,
    discount: 0,
    discountType: "amount"
  };
  docState.items.push(item);
  renderDocItems();
  recalculateDocTotals();
}

function removeDocItem(itemId) {
  docState.items = docState.items.filter((i) => i.id !== itemId);
  renderDocItems();
  recalculateDocTotals();
}

function updateDocItem(itemId, field, value) {
  const item = docState.items.find((i) => i.id === itemId);
  if (!item) return;
  if (field === "qty" || field === "price" || field === "discount") {
    item[field] = parseFloat(value) || 0;
  } else {
    item[field] = value;
  }
  recalculateDocTotals();
  const row = document.querySelector(`tr[data-item-id="${itemId}"]`);
  if (row) {
    const totalCell = row.querySelector(".item-total");
    if (totalCell) {
      const lineTotal = calcLineTotal(item);
      totalCell.textContent = formatMoney(lineTotal);
    }
  }
}

function calcLineTotal(item) {
  const subtotal = item.qty * item.price;
  let discount = 0;
  if (item.discountType === "percent") {
    discount = subtotal * (item.discount / 100);
  } else {
    discount = item.discount;
  }
  return Math.max(0, subtotal - discount);
}

function recalculateDocTotals() {
  let subtotal = 0;
  let itemDiscountTotal = 0;

  docState.items.forEach((item) => {
    const lineSubtotal = item.qty * item.price;
    subtotal += lineSubtotal;
    if (item.discountType === "percent") {
      itemDiscountTotal += lineSubtotal * (item.discount / 100);
    } else {
      itemDiscountTotal += item.discount;
    }
  });

  const afterItemDiscount = subtotal - itemDiscountTotal;

  let totalDiscount = 0;
  const docOptDiscount = document.getElementById("docOptDiscount");
  if (docOptDiscount && docOptDiscount.checked) {
    const discountValue = parseFloat(document.getElementById("docDiscountValue")?.value || 0);
    const discountType = document.getElementById("docDiscountType")?.value || "percent";
    if (discountType === "percent") {
      totalDiscount = afterItemDiscount * (discountValue / 100);
    } else {
      totalDiscount = discountValue;
    }
  }

  const afterDiscount = afterItemDiscount - totalDiscount;

  let vatAmount = 0;
  const docOptVat = document.getElementById("docOptVat");
  const vatRate = parseFloat(document.getElementById("docVatRate")?.value || 7);
  if (docOptVat && docOptVat.checked) {
    vatAmount = afterDiscount * (vatRate / 100);
  }

  let whtAmount = 0;
  const docOptWht = document.getElementById("docOptWht");
  const whtRate = parseFloat(document.getElementById("docWhtRate")?.value || 3);
  if (docOptWht && docOptWht.checked) {
    let whtBase = afterDiscount;
    if (docOptVat && docOptVat.checked && (document.getElementById("docOptVatInc")?.checked)) {
      whtBase = afterDiscount / (1 + vatRate / 100);
    }
    whtAmount = whtBase * (whtRate / 100);
  }

  const grandTotal = afterDiscount + vatAmount - whtAmount;

  setText("docSubtotal", formatMoney(subtotal));
  setText("docItemDiscount", "-" + formatMoney(itemDiscountTotal));
  setText("docTotalDiscount", "-" + formatMoney(totalDiscount));
  setText("docAfterDiscount", formatMoney(afterDiscount));
  setText("docVatAmount", formatMoney(vatAmount));
  setText("docWhtAmount", "-" + formatMoney(whtAmount));
  setText("docGrandTotal", formatMoney(grandTotal));

  const vatRowLabel = document.querySelector("#docVatRow span:first-child");
  if (vatRowLabel) vatRowLabel.textContent = "VAT " + vatRate + "%";

  const whtRowLabel = document.querySelector("#docWhtRow span:first-child");
  if (whtRowLabel) whtRowLabel.textContent = "หัก ณ ที่จ่าย " + whtRate + "%";
}

function formatDateThai(dateStr) {
  if (!dateStr) return "-";
  const d = new Date(dateStr);
  if (isNaN(d)) return dateStr;
  const months = ["ม.ค.", "ก.พ.", "มี.ค.", "เม.ย.", "พ.ค.", "มิ.ย.", "ก.ค.", "ส.ค.", "ก.ย.", "ต.ค.", "พ.ย.", "ธ.ค."];
  return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear() + 543}`;
}

function formatDateEN(dateStr) {
  if (!dateStr) return "-";
  const d = new Date(dateStr);
  if (isNaN(d)) return dateStr;
  const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
  return `${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}

function formatDocDate(dateStr) {
  return getDocLang() === "th" ? formatDateThai(dateStr) : formatDateEN(dateStr);
}

function numberToThaiText(num) {
  const digits = ["ศูนย์", "หนึ่ง", "สอง", "สาม", "สี่", "ห้า", "หก", "เจ็ด", "แปด", "เก้า"];
  const positions = ["", "สิบ", "ร้อย", "พัน", "หมื่น", "แสน", "ล้าน"];
  
  if (num === 0) return "ศูนย์บาทถ้วน";
  
  num = Math.abs(num);
  const intPart = Math.floor(num);
  const decPart = Math.round((num - intPart) * 100);
  
  function convertGroup(n) {
    if (n === 0) return "";
    let str = "";
    const nStr = String(n);
    const len = nStr.length;
    for (let i = 0; i < len; i++) {
      const digit = parseInt(nStr[i]);
      const pos = len - i - 1;
      if (digit === 0) continue;
      if (pos === 1 && digit === 1) {
        str += "สิบ";
      } else if (pos === 1 && digit === 2) {
        str += "ยี่สิบ";
      } else if (pos === 0 && digit === 1 && len > 1) {
        str += "เอ็ด";
      } else {
        str += digits[digit] + positions[pos];
      }
    }
    return str;
  }
  
  let result = "";
  if (intPart >= 1000000) {
    result += convertGroup(Math.floor(intPart / 1000000)) + "ล้าน";
    result += convertGroup(intPart % 1000000);
  } else {
    result = convertGroup(intPart);
  }
  result += "บาท";
  
  if (decPart > 0) {
    result += convertGroup(decPart) + "สตางค์";
  } else {
    result += "ถ้วน";
  }
  
  return result;
}

function applyPreviewScale(mode = "fit-page") {
  const stage = document.querySelector(".a4-preview-stage");
  const page = document.getElementById("docPreviewPrint");
  if (!stage || !page) return;

  previewScaleMode = mode;

  const stageRect = stage.getBoundingClientRect();
  const pageWidth = page.offsetWidth;
  const pageHeight = page.offsetHeight;
  if (!pageWidth || !pageHeight) return;

  let scale = 1;
  if (mode === "fit-width") {
    scale = stageRect.width / pageWidth;
  } else if (mode === "actual") {
    scale = 1;
  } else {
    scale = Math.min(stageRect.width / pageWidth, stageRect.height / pageHeight);
  }

  scale = Math.min(scale, 1);
  page.style.transform = `scale(${scale})`;
  page.style.transformOrigin = "top center";
}

function downloadPDF() {
  const printContent = document.getElementById("docPreviewPrint");
  if (!printContent) {
    alert("กรุณาพรีวิวเอกสารก่อน");
    return;
  }
  
  const docNo = document.getElementById("docNoInput")?.value || "document";
  const docType = document.getElementById("docTypeSelect")?.value || "QUO";
  const config = DOC_CONFIG[docType] || DOC_CONFIG.QUO;
  const filename = `${config.prefix}_${docNo}.pdf`;
  
  const printNode = printContent.cloneNode(true);
  printNode.style.transform = "none";
  printNode.style.transformOrigin = "top left";

  if (typeof html2pdf !== "undefined") {
    if (typeof generatePdfFromNode === "function") {
      generatePdfFromNode(printNode, filename);
    } else {
      // Read accent color from source before overwriting styles
      const srcAccent = printContent.style.getPropertyValue("--doc-accent").trim() || config.color || "#1e5c8a";
      const srcSoft = printContent.style.getPropertyValue("--doc-accent-soft").trim() || hexToRgba(srcAccent, 0.12);
      // Inline fallback
      const container = document.createElement("div");
      container.style.cssText = "position:fixed;left:-9999px;top:0;width:210mm;background:#fff;z-index:-1;";
      const clone = printNode.cloneNode(true);
      clone.style.cssText = "transform:none;width:210mm;min-height:auto;padding:16mm;box-sizing:border-box;";
      // Inject color overrides for html2canvas
      const oStyle = document.createElement("style");
      oStyle.textContent = `.doc-company-name,.doc-title-th,.doc-note-title,.doc-payment-title,.doc-terms-title,.doc-signature-title,.doc-meta-table .doc-meta-label{color:${srcAccent}!important}.doc-section-title{background:${srcSoft}!important;color:${srcAccent}!important}.doc-totals-table .total{background:${srcSoft}!important;color:${srcAccent}!important}.doc-totals-table .total td,.doc-totals-table .total .value{color:${srcAccent}!important}.doc-amount-words,.doc-amount-words-bar{background:${srcSoft}!important;border-color:${srcAccent}!important;color:${srcAccent}!important}.doc-bank-icon{background:${srcAccent}!important}`;
      clone.insertBefore(oStyle, clone.firstChild);
      container.appendChild(clone);
      document.body.appendChild(container);
      html2pdf().set({
        margin: 0, filename: filename,
        image: { type: "jpeg", quality: 0.98 },
        html2canvas: { scale: 2, useCORS: true, letterRendering: true, width: 794, windowWidth: 794 },
        jsPDF: { unit: "mm", format: "a4", orientation: "portrait" }
      }).from(clone).save().then(() => document.body.removeChild(container));
    }
  } else {
    const printWindow = window.open("", "_blank", "width=800,height=600");
    printWindow.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${filename}</title><link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet"><style>${getDocPrintStyles()}</style></head><body>${printNode.outerHTML}</body></html>`);
    printWindow.document.close();
    printWindow.onload = function() { printWindow.focus(); printWindow.print(); };
  }
}

  alert(`กำลังเตรียมส่งออก ${docIds.length} เอกสาร...\n\nฟีเจอร์นี้ต้องการ library เพิ่มเติม (เช่น jsPDF) สำหรับรวม PDF หลายไฟล์`);
}

function getDateRangeFromPeriod(period) {
  const now = new Date();
  let fromDate, toDate;
  
  switch (period) {
    case "month":
      fromDate = new Date(now.getFullYear(), now.getMonth(), 1);
      toDate = new Date(now.getFullYear(), now.getMonth() + 1, 0);
      break;
    case "quarter":
      const quarter = Math.floor(now.getMonth() / 3);
      fromDate = new Date(now.getFullYear(), quarter * 3, 1);
      toDate = new Date(now.getFullYear(), quarter * 3 + 3, 0);
      break;
    case "year":
      fromDate = new Date(now.getFullYear(), 0, 1);
      toDate = new Date(now.getFullYear(), 11, 31);
      break;
    default:
      fromDate = new Date(now.getFullYear(), now.getMonth(), 1);
      toDate = new Date(now.getFullYear(), now.getMonth() + 1, 0);
  }
  
  return {
    from: fromDate.toISOString().split("T")[0],
    to: toDate.toISOString().split("T")[0]
  };
}

function filterDashboardByDateRange(fromDate, toDate) {
  const docs = state.documents || [];
  const from = new Date(fromDate);
  const to = new Date(toDate);
  to.setHours(23, 59, 59, 999);
  
  const filtered = docs.filter(doc => {
    const docDate = new Date(doc.docDate || doc.createdAt);
    return docDate >= from && docDate <= to;
  });
  
  // Calculate KPIs from filtered documents
  let salesTotal = 0;
  let paidTotal = 0;
  let unpaidTotal = 0;
  let vatOutput = 0;
  const unpaidDocs = [];
  
  filtered.forEach(doc => {
    const json = doc.json || {};
    const grandTotal = parseFloat(json.grandTotal) || 0;
    // Calculate VAT: use vatAmount if exists, otherwise estimate 7% from grandTotal
    const vat = parseFloat(json.vatAmount) || (grandTotal * 7 / 107);
    
    // Count by status
    if (doc.status === "paid") {
      paidTotal += grandTotal;
      vatOutput += vat;
    } else if (doc.status === "pending" || doc.status === "draft") {
      unpaidTotal += grandTotal;
      unpaidDocs.push({
        docNo: doc.docNo || doc.name,
        customerName: json.customerName || "ไม่ระบุ",
        grandTotal: grandTotal,
        dueDate: doc.dueDate,
        isOverdue: doc.dueDate && new Date(doc.dueDate) < new Date()
      });
    }
    
    salesTotal += grandTotal;
  });
  
  // Update KPI display
  setText("kpiSalesThisMonth", formatMoney(salesTotal));
  setText("kpiUnpaidTotal", formatMoney(unpaidTotal));
  setText("kpiPaidThisMonth", formatMoney(paidTotal));
  setText("kpiVatOutput", formatMoney(vatOutput));
  
  // Update unpaid docs panel
  const unpaidEl = document.getElementById("unpaidDocsPanel");
  if (unpaidEl) {
    clearElement(unpaidEl);
    if (!unpaidDocs.length) {
      const empty = document.createElement("div");
      empty.className = "muted";
      empty.textContent = "ไม่มีเอกสารค้างชำระ";
      unpaidEl.appendChild(empty);
    } else {
      unpaidDocs.forEach((doc, index) => {
        const item = document.createElement("div");
        item.style.padding = "10px 0";
        if (index < unpaidDocs.length - 1) {
          item.style.borderBottom = "1px solid var(--color-border)";
        }
        
        const line1 = document.createElement("div");
        line1.textContent = (doc.docNo || "") + " · " + (doc.customerName || "ไม่ระบุ");
        if (doc.isOverdue) line1.style.color = "#b91c1c";
        
        const line2 = document.createElement("div");
        line2.className = "muted";
        line2.textContent = formatMoney(doc.grandTotal || 0) + (doc.dueDate ? " · ครบกำหนด " + doc.dueDate : "");
        
        item.appendChild(line1);
        item.appendChild(line2);
        unpaidEl.appendChild(item);
      });
    }
  }
}

function initDashboard() {
  // Date range selector
  const dateRangeBtns = document.querySelectorAll(".date-range-btn");
  const customDateRange = document.getElementById("customDateRange");
  
  // Set default dates for custom range
  const today = new Date();
  const firstOfMonth = new Date(today.getFullYear(), today.getMonth(), 1);
  document.getElementById("dashboardDateFrom").value = firstOfMonth.toISOString().split("T")[0];
  document.getElementById("dashboardDateTo").value = today.toISOString().split("T")[0];
  
  dateRangeBtns.forEach(btn => {
    btn.addEventListener("click", () => {
      dateRangeBtns.forEach(b => b.classList.remove("is-active"));
      btn.classList.add("is-active");
      
      const range = btn.dataset.range;
      if (range === "custom") {
        customDateRange.style.display = "flex";
      } else {
        customDateRange.style.display = "none";
        
        // Get date range and filter data
        const dateRange = getDateRangeFromPeriod(range);
        filterDashboardByDateRange(dateRange.from, dateRange.to);
        
        // Update period label
        const periodEl = document.getElementById("kpiSalesPeriod");
        if (periodEl) {
          const labels = { month: "เดือนนี้", quarter: "ไตรมาสนี้", year: "ปีนี้" };
          periodEl.textContent = labels[range] || "เดือนนี้";
        }
      }
    });
  });
  
  const btnApplyDateRange = document.getElementById("btnApplyDateRange");
  if (btnApplyDateRange) {
    btnApplyDateRange.addEventListener("click", () => {
      const from = document.getElementById("dashboardDateFrom").value;
      const to = document.getElementById("dashboardDateTo").value;
      if (from && to) {
        filterDashboardByDateRange(from, to);
        
        const periodEl = document.getElementById("kpiSalesPeriod");
        if (periodEl) {
          const fromFormatted = new Date(from).toLocaleDateString("th-TH", { day: "numeric", month: "short" });
          const toFormatted = new Date(to).toLocaleDateString("th-TH", { day: "numeric", month: "short", year: "2-digit" });
          periodEl.textContent = `${fromFormatted} - ${toFormatted}`;
        }
      }
    });
  }
}

function applyDocColorsFromSettings() {
  var types = ["QUO","INV","BILL","TAX","RCPT","DO","PO","CN","PV","PR"];
  types.forEach(function(dt) {
    var saved = state.settings["docColor." + dt];
    if (saved && DOC_CONFIG[dt]) {
      DOC_CONFIG[dt].color = saved;
    }
  });
}

function init() {
  applyTheme(state.settings["ui.theme"] || state.defaults.theme || "blue");
  applyFont(state.settings["ui.font"] || state.defaults.font || "sarabun");
  applyDocColorsFromSettings();
  initCompanySwitcher();
  initNavEvents();
  initMasterButtons();
  initSettingsPage();
  initDocumentPage();
  initDocHistoryPage();
  initDashboard();
  refreshAll();
}

document.addEventListener("DOMContentLoaded", init);

</script>
