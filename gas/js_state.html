  var payload = document.body ? document.body.dataset.bootstrap : "";

  }
  try {
    return JSON.parse(decodeURIComponent(payload));
  } catch (error) {
    return {};
  }
}

  currentView: "dashboard",
  themes: bootstrap.config ? bootstrap.config.themes : [],
  fonts: bootstrap.config ? bootstrap.config.fonts : [],
  defaults: bootstrap.config ? bootstrap.config.defaults : {},
  settings: bootstrap.settings || {},
  companies: (bootstrap.companies && bootstrap.companies.length) ? bootstrap.companies : [],
  companyId: "",
  customers: [],
  products: [],
  salespersons: [],
  documents: [],
  unpaidDocs: [],
  kpi: {},
  salesTrend: [],
  sheetsId: bootstrap.sheetsId || "",
  sheetsConnection: bootstrap.sheetsConnection || {}
};

var viewTitles = {
  dashboard: { title: "แดชบอร์ด", subtitle: "ภาพรวมธุรกิจแบบมืออาชีพ" },
  products: { title: "สินค้า/บริการ", subtitle: "จัดการสินค้าและบริการ" },
  customers: { title: "ลูกค้า", subtitle: "ข้อมูลลูกค้าเพื่อออกเอกสาร" },
  salespersons: { title: "พนักงานขาย", subtitle: "จัดการข้อมูลพนักงานขายสำหรับออกเอกสาร" },

  settings: { title: "ตั้งค่า", subtitle: "ฟอนต์ ธีม และค่าเริ่มต้น" }
};

function setView(viewId) {
  state.currentView = viewId;
  document.querySelectorAll(".view").forEach(function(view) {
    view.classList.toggle("is-active", view.dataset.view === viewId);
  });

  document.querySelectorAll(".nav-item").forEach(function(button) {
    button.classList.toggle("is-active", button.dataset.view === viewId);
  });

  document.querySelectorAll(".bottom-item").forEach(function(button) {
    button.classList.toggle("is-active", button.dataset.view === viewId);
  });

  var titleData = viewTitles[viewId] || {};
  var titleEl = document.getElementById("viewTitle");
  var subtitleEl = document.querySelector(".topbar-subtitle");
  if (titleEl) {
    titleEl.textContent = titleData.title || "";
  }
  if (subtitleEl) {
    subtitleEl.textContent = titleData.subtitle || "";
  }

  // Auto-close sidebar on mobile/tablet after navigation
  if (window.innerWidth <= 1024) {
    closeMobileSidebar();
  }

  // Scroll content to top on view change
  var contentEl = document.getElementById("contentRoot");
  if (contentEl) contentEl.scrollTop = 0;

  // Refresh docNo when navigating to document creation page
  if (viewId === "documents" && typeof refreshDocNo === "function") {
    refreshDocNo();
  }
}

function toggleSidebar() {
  var isMobile = window.innerWidth <= 1024;
  if (isMobile) {
    document.body.classList.toggle("sidebar-open");
  } else {
    document.body.classList.toggle("sidebar-collapsed");
  }
}

function openMobileSidebar() {
  document.body.classList.add("sidebar-open");
}

function closeMobileSidebar() {
  document.body.classList.remove("sidebar-open");
}

function hexToRgba(hex, alpha) {
  var value = hex.replace("#", "");
  var bigint = parseInt(value, 16);
  var r = (bigint >> 16) & 255;
  var g = (bigint >> 8) & 255;
  var b = bigint & 255;
  return "rgba(" + r + ", " + g + ", " + b + ", " + alpha + ")";
}

function applyTheme(themeId) {
  var theme = state.themes.find(function(item) { return item.id === themeId; }) || state.themes[0];
  if (!theme) {
    return;
  }
  document.documentElement.style.setProperty("--color-primary", theme.value);
  document.documentElement.style.setProperty("--color-primary-soft", hexToRgba(theme.value, 0.12));
}

function applyFont(fontId) {
  var font = state.fonts.find(function(item) { return item.id === fontId; }) || state.fonts[0];
  if (!font) {
    return;
  }
  document.documentElement.style.setProperty("--font-body", font.css);
}

function safeLocalStorageGet(key) {
  try {
    return localStorage.getItem(key) || "";
  } catch (error) {
    return "";
  }
}

function safeLocalStorageSet(key, value) {
  try {
    localStorage.setItem(key, value);
  } catch (error) {}
}
