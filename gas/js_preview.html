<script>
function formatPhone(phone) {
  var s = String(phone || "").replace(/[^0-9]/g, "");
  if (!s) return "";
  // Restore leading 0 for Thai numbers
  if (s.length === 9 && s[0] !== "0") s = "0" + s;
  // Format as 0XX-XXX-XXXX
  if (s.length === 10) return s.substring(0, 3) + "-" + s.substring(3, 6) + "-" + s.substring(6);
  return s;
}

function lookupProductCode(productId) {
  if (!productId) return "";
  var product = (state.products || []).find(function(p) {
    return p.entityId === productId;
  });
  if (product) {
    var json = product.json || {};
    return json.code || product.code || "";
  }
  return "";
}

var DOC_PAGE_LIMITS_FALLBACK = { singlePage: 7, firstPage: 9, contPage: 15, lastPage: 7 };

function measureDocHeights(p) {
  try {
    var outer = document.createElement("div");
    outer.style.cssText = "position:absolute;left:-9999px;top:0;visibility:hidden;pointer-events:none;width:210mm;";
    document.body.appendChild(outer);

    var ruler = document.createElement("div");
    ruler.style.cssText = "height:267mm;width:1px;";
    outer.appendChild(ruler);
    var pageH = ruler.offsetHeight;
    ruler.remove();
    if (!pageH || pageH < 100) { outer.remove(); return null; }

    var bufRuler = document.createElement("div");
    bufRuler.style.cssText = "height:5mm;width:1px;";
    outer.appendChild(bufRuler);
    pageH -= bufRuler.offsetHeight;
    bufRuler.remove();

    var box = document.createElement("div");
    box.className = "doc-preview";
    box.style.cssText = "width:210mm;padding:16mm;box-sizing:border-box;margin:0;";
    box.style.setProperty("--doc-accent", p.themeColor);
    box.style.setProperty("--doc-accent-soft", p.accentSoft);
    outer.appendChild(box);

    function mBlock(html) {
      var w = document.createElement("div");
      w.style.overflow = "hidden";
      w.innerHTML = html;
      box.appendChild(w);
      var h = w.offsetHeight;
      w.remove();
      return h;
    }

    var badgeH = mBlock(p.badgeHtml);
    var pageIndicatorH = mBlock('<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;"><div style="font-size:11px;color:#6b7280;">P 1/2</div><div class="doc-badge"><span>copy</span></div></div>');
    var headerH = mBlock(p.headerHtml + p.metaHtml);
    var customerH = mBlock(p.customerHtml);
    var sectionTitleH = mBlock('<div class="doc-section-title">' + p.itemsTitle + '</div>');
    var summaryH = mBlock(p.summaryHtml);
    var carryForwardH = mBlock('<table class="doc-items-table"><tbody><tr><td colspan="8" style="text-align:right;font-weight:600;padding:6px 8px;border-top:1.5px solid #d1d5db;font-size:11px;color:#374151;">ยอดยกไป ฿0.00</td></tr></tbody></table>');
    var emptyRowH = mBlock('<table class="doc-items-table"><tbody><tr><td>&nbsp;</td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr></tbody></table>');

    var fullTableEl = document.createElement("div");
    fullTableEl.innerHTML = p.tableOpenHtml + p.itemRows.join("") + '</tbody></table>';
    box.appendChild(fullTableEl);

    var thead = fullTableEl.querySelector("thead");
    var theadH = thead ? thead.offsetHeight : 0;

    var allTrs = fullTableEl.querySelectorAll("tbody tr");
    var itemHeights = [];
    var curH = 0;
    for (var r = 0; r < allTrs.length; r++) {
      if (allTrs[r].classList.contains("doc-item-row")) {
        if (r > 0 && curH > 0) itemHeights.push(curH);
        curH = allTrs[r].offsetHeight;
      } else {
        curH += allTrs[r].offsetHeight;
      }
    }
    if (curH > 0) itemHeights.push(curH);

    fullTableEl.remove();
    outer.remove();

    return {
      pageH: pageH,
      badgeH: badgeH,
      pageIndicatorH: pageIndicatorH,
      headerH: headerH,
      customerH: customerH,
      sectionTitleH: sectionTitleH,
      theadH: theadH,
      itemHeights: itemHeights,
      summaryH: summaryH,
      carryForwardH: carryForwardH,
      emptyRowH: emptyRowH
    };
  } catch (e) {
    try { outer.remove(); } catch(x) {}
    return null;
  }
}

function splitItemsByHeight(m, cfH) {
  cfH = cfH || 0;
  var total = m.itemHeights.length;
  if (total === 0) return { chunks: [[]], isSingle: true };

  var singleOverhead = m.badgeH + m.headerH + m.customerH + m.sectionTitleH + m.theadH;
  var itemsH = 0;
  var allFit = true;
  for (var i = 0; i < total; i++) {
    itemsH += m.itemHeights[i];
    if (singleOverhead + itemsH + m.summaryH > m.pageH) { allFit = false; break; }
  }
  if (allFit) {
    var arr = []; for (var j = 0; j < total; j++) arr.push(j);
    return { chunks: [arr], isSingle: true };
  }

  var chunks = [];
  var idx = 0;

  var firstOverhead = m.pageIndicatorH + m.headerH + m.customerH + m.sectionTitleH + m.theadH;
  var firstAvail = m.pageH - firstOverhead - cfH;
  var firstChunk = [];
  var used = 0;
  while (idx < total) {
    if (used + m.itemHeights[idx] > firstAvail && firstChunk.length > 0) break;
    firstChunk.push(idx);
    used += m.itemHeights[idx];
    idx++;
  }
  chunks.push(firstChunk);

  var contOverhead = m.pageIndicatorH + m.headerH + m.sectionTitleH + m.theadH;

  while (idx < total) {
    var remainH = 0;
    for (var k = idx; k < total; k++) remainH += m.itemHeights[k];

    var lastAvail = m.pageH - contOverhead - m.summaryH - cfH;
    if (remainH <= lastAvail || idx === total - 1) {
      var lastChunk = [];
      while (idx < total) { lastChunk.push(idx); idx++; }
      chunks.push(lastChunk);
    } else {
      var pageAvail = m.pageH - contOverhead - (cfH * 2);
      var chunk = [];
      var pgUsed = 0;
      while (idx < total - 1) {
        if (pgUsed + m.itemHeights[idx] > pageAvail && chunk.length > 0) break;
        chunk.push(idx);
        pgUsed += m.itemHeights[idx];
        idx++;
      }
      if (chunk.length === 0) { chunk.push(idx); idx++; }
      chunks.push(chunk);
    }
  }

  // Widow/orphan prevention: ensure last page has at least 2 items with summary
  if (chunks.length >= 2) {
    var lastChunk = chunks[chunks.length - 1];
    var prevChunk = chunks[chunks.length - 2];
    while (lastChunk.length < 2 && prevChunk.length > 1) {
      lastChunk.unshift(prevChunk.pop());
    }
  }

  return { chunks: chunks, isSingle: false };
}

function _measureSinglePageOverflow(p, allItemIndices) {
  var outer;
  try {
    var contentHtml = '';
    if (p.showStamp && p.stampImage) contentHtml += p.watermarkHtml || '';
    contentHtml += p.badgeHtml || '';
    contentHtml += p.headerHtml || '';
    contentHtml += p.metaHtml || '';
    contentHtml += p.customerHtml || '';
    contentHtml += '<div class="doc-section-title">' + (p.itemsTitle || '') + '</div>';
    var items = '';
    for (var i = 0; i < allItemIndices.length; i++) items += p.itemRows[allItemIndices[i]];
    contentHtml += (p.tableOpenHtml || '') + items + '</tbody></table>';
    contentHtml += p.summaryHtml || '';

    outer = document.createElement('div');
    outer.style.cssText = 'position:fixed;left:-9999px;top:0;opacity:0;pointer-events:none;width:210mm;z-index:-9999;';
    document.body.appendChild(outer);

    // Measure 297mm target in px using a ruler
    var ruler = document.createElement('div');
    ruler.style.cssText = 'width:1px;height:297mm;';
    outer.appendChild(ruler);
    var targetH = ruler.offsetHeight;
    ruler.remove();
    if (!targetH || targetH < 100) { console.warn('[overflow] ruler failed, targetH=', targetH); outer.remove(); return { fits: true, factor: 1 }; }

    // Render content with auto height — apply font styles inline to avoid class overflow issues
    var box = document.createElement('div');
    box.style.cssText = 'width:210mm;height:auto;padding:16mm;box-sizing:border-box;margin:0;font-family:Sarabun,sans-serif;font-size:13px;color:#111827;line-height:1.5;position:relative;overflow:visible;';
    box.style.setProperty('overflow', 'visible', 'important');
    box.style.setProperty('--doc-accent', p.themeColor || '#1e5c8a');
    box.style.setProperty('--doc-accent-soft', p.accentSoft || 'rgba(30,92,138,0.12)');
    // Add doc-preview class for child selector matching but override overflow
    box.className = 'doc-preview';
    box.innerHTML = contentHtml;
    outer.appendChild(box);

    // Force reflow
    void box.offsetWidth;
    var actualH = box.offsetHeight;

    outer.remove();

    if (!actualH || actualH < 50) {
      console.warn('[overflow] actualH suspiciously small:', actualH);
      return { fits: true, factor: 1 };
    }

    if (actualH <= targetH) return { fits: true, factor: 1 };
    var factor = targetH / actualH;
    return { fits: false, factor: factor };
  } catch (e) {
    console.error('[overflow] _measureSinglePageOverflow error:', e.message, e.stack);
    try { if (outer && outer.parentNode) outer.remove(); } catch(x) {}
    return { fits: true, factor: 1 };
  }
}

function _measurePageFit(p, chunkIndices, opts) {
  var outer;
  try {
    var contentHtml = '';
    if (p.showStamp && p.stampImage) contentHtml += p.watermarkHtml || '';
    if (opts.isMultiPage) {
      contentHtml += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;"><div style="font-size:11px;color:#6b7280;">P 1/2</div><div class="doc-badge"><span>copy</span></div></div>';
    } else {
      contentHtml += p.badgeHtml || '';
    }
    contentHtml += p.headerHtml || '';
    contentHtml += p.metaHtml || '';
    if (opts.isFirst) contentHtml += p.customerHtml || '';
    contentHtml += '<div class="doc-section-title">' + (p.itemsTitle || '') + '</div>';
    var tableContent = '';
    if (opts.hasBF) {
      tableContent += '<tr class="doc-carry-forward"><td colspan="' + (p.tableColspan || 8) + '" style="text-align:right;font-weight:600;padding:4px 8px;border-bottom:1.5px solid #d1d5db;font-size:11px;color:#374151;">\u0e22\u0e2d\u0e14\u0e22\u0e01\u0e21\u0e32: \u0e3f0.00</td></tr>';
    }
    for (var i = 0; i < chunkIndices.length; i++) tableContent += p.itemRows[chunkIndices[i]];
    if (opts.hasCF) {
      tableContent += '<tr class="doc-carry-forward"><td colspan="' + (p.tableColspan || 8) + '" style="text-align:right;font-weight:600;padding:4px 8px;border-top:1.5px solid #d1d5db;font-size:11px;color:#374151;">\u0e22\u0e2d\u0e14\u0e22\u0e01\u0e44\u0e1b: \u0e3f0.00</td></tr>';
    }
    contentHtml += (p.tableOpenHtml || '') + tableContent + '</tbody></table>';
    if (opts.showSummary) contentHtml += p.summaryHtml || '';

    outer = document.createElement('div');
    outer.style.cssText = 'position:fixed;left:-9999px;top:0;opacity:0;pointer-events:none;width:210mm;z-index:-9999;';
    document.body.appendChild(outer);
    var ruler = document.createElement('div');
    ruler.style.cssText = 'width:1px;height:297mm;';
    outer.appendChild(ruler);
    var targetH = ruler.offsetHeight;
    ruler.remove();
    if (!targetH || targetH < 100) { outer.remove(); return true; }

    var box = document.createElement('div');
    box.className = 'doc-preview';
    box.style.cssText = 'width:210mm;height:auto;padding:16mm;box-sizing:border-box;margin:0;font-family:Sarabun,sans-serif;font-size:13px;color:#111827;line-height:1.5;position:relative;overflow:visible;';
    box.style.setProperty('overflow', 'visible', 'important');
    box.style.setProperty('--doc-accent', p.themeColor || '#1e5c8a');
    box.style.setProperty('--doc-accent-soft', p.accentSoft || 'rgba(30,92,138,0.12)');
    box.innerHTML = contentHtml;
    outer.appendChild(box);
    void box.offsetWidth;
    var actualH = box.offsetHeight;
    outer.remove();
    if (!actualH || actualH < 50) return true;
    return actualH <= targetH;
  } catch (e) {
    try { if (outer && outer.parentNode) outer.remove(); } catch(x) {}
    return true;
  }
}

function _validateAndRebalanceChunks(p, chunks) {
  var MAX_ITER = 50;
  for (var iter = 0; iter < MAX_ITER; iter++) {
    var changed = false;
    var totalPages = chunks.length;
    for (var pg = 0; pg < totalPages; pg++) {
      if (chunks[pg].length === 0) continue;
      var isFirst = (pg === 0);
      var isLast = (pg === totalPages - 1);
      var fits = _measurePageFit(p, chunks[pg], {
        isFirst: isFirst, isLast: isLast, showSummary: isLast,
        isMultiPage: true, hasBF: !isFirst, hasCF: !isLast
      });
      if (!fits && chunks[pg].length > 1) {
        var overflow = chunks[pg].pop();
        if (pg + 1 < totalPages) {
          chunks[pg + 1].unshift(overflow);
        } else {
          chunks.push([overflow]);
        }
        changed = true;
        break;
      }
    }
    if (!changed) break;
  }

  // Pass 2: Pull items from next page to fill underfilled pages
  // IMPORTANT: if pulling would empty the next page, the current page becomes
  // the last page and must include the summary in its fit check.
  for (var iter2 = 0; iter2 < MAX_ITER; iter2++) {
    var pulled = false;
    var tp = chunks.length;
    for (var pg2 = 0; pg2 < tp - 1; pg2++) {
      if (!chunks[pg2 + 1] || chunks[pg2 + 1].length === 0) continue;
      // Would pulling this item empty the next page?
      var wouldEmptyNext = (chunks[pg2 + 1].length === 1) && (pg2 + 1 === tp - 1);
      // If it would empty the last page, this page becomes the last page
      var becomesLast = wouldEmptyNext || (pg2 === tp - 1);
      var candidate = chunks[pg2].concat([chunks[pg2 + 1][0]]);
      var isF = (pg2 === 0);
      var canFit = _measurePageFit(p, candidate, {
        isFirst: isF, isLast: becomesLast, showSummary: becomesLast,
        isMultiPage: !wouldEmptyNext, hasBF: !isF, hasCF: !becomesLast
      });
      if (canFit) {
        chunks[pg2].push(chunks[pg2 + 1].shift());
        pulled = true;
        break;
      }
    }
    if (!pulled) break;
  }

  // Widow/orphan: if last page has < 2 items, pull from previous page
  chunks = chunks.filter(function(c) { return c.length > 0; });
  if (chunks.length >= 2) {
    var last = chunks[chunks.length - 1];
    var prev = chunks[chunks.length - 2];
    while (last.length < 2 && prev.length > 2) {
      last.unshift(prev.pop());
    }
  }

  return chunks.filter(function(c) { return c.length > 0; });
}

function _pruneBlankTrailingPages(node) {
  var pages = node.querySelectorAll('.doc-page');
  if (pages.length < 2) return;
  for (var i = pages.length - 1; i >= 1; i--) {
    var page = pages[i];
    var hasItems = page.querySelector('.doc-item-row');
    var hasSummary = page.querySelector('.doc-summary');
    var hasSignature = page.querySelector('.doc-signature');
    var hasNote = page.querySelector('.doc-note-footer');
    if (!hasItems && !hasSummary && !hasSignature && !hasNote) {
      page.parentNode.removeChild(page);
    } else {
      break;
    }
  }
}

function generateDocPages(p) {
  var L = p.L;
  var totalItems = p.itemRows.length;
  var itemAmounts = p.itemAmounts || [];
  var tableColspan = p.tableColspan || 8;
  var currSym = p.currSym || "฿";

  var m = measureDocHeights(p);
  var split;
  var shrinkFactor = 0;

  if (m && m.itemHeights.length === totalItems) {
    split = splitItemsByHeight(m, m.carryForwardH);
  } else {
    var fb = DOC_PAGE_LIMITS_FALLBACK;
    var isSingle = totalItems <= fb.singlePage;
    if (isSingle) {
      var arr = []; for (var f = 0; f < totalItems; f++) arr.push(f);
      split = { chunks: [arr], isSingle: true };
    } else {
      var chs = [], ci = 0;
      var fc = Math.min(totalItems, fb.firstPage);
      var c0 = []; for (var f1 = 0; f1 < fc; f1++) c0.push(f1);
      chs.push(c0); ci = fc;
      while (ci < totalItems) {
        var rem = totalItems - ci;
        if (rem <= fb.lastPage) {
          var cl = []; while (ci < totalItems) { cl.push(ci); ci++; }
          chs.push(cl);
        } else {
          var tk = Math.min(fb.contPage, rem - 1);
          var cm = []; for (var f2 = ci; f2 < ci + tk; f2++) cm.push(f2);
          chs.push(cm); ci += tk;
        }
      }
      split = { chunks: chs, isSingle: false };
    }
  }

  var chunks = split.chunks;
  var totalPages = chunks.length;
  var html = '';

  // DOM-based validation: if would render as 1 page, check real overflow
  if (totalPages === 1 && totalItems > 0) {
    var allIdx = [];
    for (var vi = 0; vi < totalItems; vi++) allIdx.push(vi);
    var validation = _measureSinglePageOverflow(p, allIdx);
    if (!validation.fits) {
      if (totalItems === 1) {
        // Single item doc — auto-shrink to keep on one page
        shrinkFactor = Math.floor(validation.factor * 100) / 100;
      } else {
        // Multiple items — force multi-page split
        if (m) {
          split = splitItemsByHeight(m, m.carryForwardH);
        } else {
          var fb2 = DOC_PAGE_LIMITS_FALLBACK;
          var chs2 = [], ci2b = 0;
          var fc2 = Math.min(totalItems, fb2.firstPage);
          var c02 = []; for (var f12 = 0; f12 < fc2; f12++) c02.push(f12);
          chs2.push(c02); ci2b = fc2;
          while (ci2b < totalItems) {
            var rem2 = totalItems - ci2b;
            if (rem2 <= fb2.lastPage) {
              var cl2 = []; while (ci2b < totalItems) { cl2.push(ci2b); ci2b++; }
              chs2.push(cl2);
            } else {
              var tk2 = Math.min(fb2.contPage, rem2 - 1);
              var cm2 = []; for (var f22 = ci2b; f22 < ci2b + tk2; f22++) cm2.push(f22);
              chs2.push(cm2); ci2b += tk2;
            }
          }
          split = { chunks: chs2, isSingle: false };
        }
        chunks = split.chunks;
        totalPages = chunks.length;
        // Safety: if re-split still yields 1 page, force a manual split
        if (totalPages === 1 && totalItems > 1) {
          var half = Math.ceil(totalItems * 0.6);
          var p1 = []; for (var hi = 0; hi < half; hi++) p1.push(hi);
          var p2 = []; for (var hi2 = half; hi2 < totalItems; hi2++) p2.push(hi2);
          chunks = [p1, p2];
          totalPages = 2;
        }
      }
    }
  }

  // Post-split per-page DOM validation for multi-page documents
  if (totalPages > 1) {
    chunks = _validateAndRebalanceChunks(p, chunks);
    totalPages = chunks.length;
  }

  // Build carried-forward running totals per page
  var pageCumTotals = [];
  if (totalPages > 1 && itemAmounts.length === totalItems) {
    var runSum = 0;
    for (var pg2 = 0; pg2 < totalPages; pg2++) {
      for (var ci3 = 0; ci3 < chunks[pg2].length; ci3++) {
        runSum += (itemAmounts[chunks[pg2][ci3]] || 0);
      }
      pageCumTotals.push(runSum);
    }
  }

  if (totalPages > 1) {
    html += '<div id="docPreviewPrint" style="width:210mm;">';
  }

  for (var pg = 0; pg < totalPages; pg++) {
    var isFirst = (pg === 0);
    var isLast = (pg === totalPages - 1);
    var pageNum = pg + 1;

    // --- Shrunk single page: nested structure ---
    if (shrinkFactor > 0 && totalPages === 1) {
      var invScale = (210 / shrinkFactor).toFixed(2);
      html += '<div id="docPreviewPrint" class="a4-preview-page" style="width:210mm;height:297mm;overflow:hidden;--doc-accent:' + p.themeColor + ';--doc-accent-soft:' + p.accentSoft + ';">';
      html += '<div class="doc-preview doc-shrink-inner" style="transform:scale(' + shrinkFactor + ');transform-origin:top left;width:' + invScale + 'mm;padding:16mm;box-sizing:border-box;">';

      if (p.showStamp && p.stampImage) html += p.watermarkHtml;
      html += p.badgeHtml;
      html += p.headerHtml;
      html += p.metaHtml;
      html += p.customerHtml;
      html += '<div class="doc-section-title">' + p.itemsTitle + '</div>';
      var shrinkItems = '';
      for (var sci = 0; sci < chunks[0].length; sci++) shrinkItems += p.itemRows[chunks[0][sci]];
      html += p.tableOpenHtml + shrinkItems + '</tbody></table>';
      html += p.summaryHtml;

      html += '</div>'; // close doc-shrink-inner
      html += '</div>'; // close a4-preview-page
      return html;
    }

    // --- Normal page rendering ---
    var pageStyle = '--doc-accent:' + p.themeColor + ';--doc-accent-soft:' + p.accentSoft + ';';
    if (totalPages > 1) {
      pageStyle += 'height:297mm;overflow:hidden;page-break-after:always;';
      if (!isLast) pageStyle += 'margin-bottom:20px;';
    } else {
      pageStyle += 'height:297mm;overflow:hidden;';
    }

    html += '<div' + (totalPages === 1 ? ' id="docPreviewPrint"' : '') + ' class="a4-preview-page doc-preview' + (totalPages > 1 ? ' doc-page' : '') + '" style="' + pageStyle + '">';

    if (p.showStamp && p.stampImage) {
      html += p.watermarkHtml;
    }

    if (totalPages > 1) {
      html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">';
      html += '<div style="font-size:11px;color:#6b7280;">' + L.pageLabel + ' ' + pageNum + ' ' + L.pageOf + ' ' + totalPages + '</div>';
      html += '<div class="doc-badge"><span>' + L.copyBadge + '</span></div>';
      html += '</div>';
    } else {
      html += p.badgeHtml;
    }

    html += p.headerHtml;
    html += p.metaHtml;

    if (isFirst) {
      html += p.customerHtml;
    }

    html += '<div class="doc-section-title">' + p.itemsTitle + '</div>';

    // Table with items + carry-forward rows
    var chunkHtml = '';

    // Brought-forward row on continuation pages
    if (!isFirst && pageCumTotals.length > 0) {
      var bfAmount = pageCumTotals[pg - 1];
      chunkHtml += '<tr class="doc-carry-forward"><td colspan="' + tableColspan + '" style="text-align:right;font-weight:600;padding:4px 8px;border-bottom:1.5px solid #d1d5db;font-size:11px;color:#374151;">' + L.broughtForward + ': ' + currSym + ' ' + Number(bfAmount).toLocaleString("en-US", {minimumFractionDigits: 2}) + '</td></tr>';
    }

    for (var ci2 = 0; ci2 < chunks[pg].length; ci2++) {
      chunkHtml += p.itemRows[chunks[pg][ci2]];
    }

    // Fill empty rows on non-last pages to push carry-forward to bottom
    if (!isLast && m && m.emptyRowH > 0 && totalPages > 1) {
      var pgOverhead;
      if (isFirst) {
        pgOverhead = m.pageIndicatorH + m.headerH + m.customerH + m.sectionTitleH + m.theadH;
      } else {
        pgOverhead = m.pageIndicatorH + m.headerH + m.sectionTitleH + m.theadH;
      }
      var usedH = 0;
      for (var ei = 0; ei < chunks[pg].length; ei++) {
        usedH += (m.itemHeights[chunks[pg][ei]] || 0);
      }
      var bfRowH = (!isFirst && pageCumTotals.length > 0) ? m.carryForwardH : 0;
      var cfRowH = m.carryForwardH;
      var spaceLeft = m.pageH - pgOverhead - usedH - bfRowH - cfRowH;
      var numEmpty = Math.max(0, Math.floor(spaceLeft / m.emptyRowH));
      for (var er = 0; er < numEmpty; er++) {
        var emptyCells = '';
        for (var ec = 0; ec < tableColspan; ec++) emptyCells += '<td>&nbsp;</td>';
        chunkHtml += '<tr class="doc-empty-row">' + emptyCells + '</tr>';
      }
    }

    // Carry-forward row on non-last pages
    if (!isLast && pageCumTotals.length > 0) {
      var cfAmount = pageCumTotals[pg];
      chunkHtml += '<tr class="doc-carry-forward"><td colspan="' + tableColspan + '" style="text-align:right;font-weight:600;padding:4px 8px;border-top:1.5px solid #d1d5db;font-size:11px;color:#374151;">' + L.carryForward + ': ' + currSym + ' ' + Number(cfAmount).toLocaleString("en-US", {minimumFractionDigits: 2}) + '</td></tr>';
    }

    html += p.tableOpenHtml + chunkHtml + '</tbody></table>';

    if (isLast) {
      html += p.summaryHtml;
    }

    html += '</div>';
  }

  if (totalPages > 1) {
    html += '</div>';
  }

  return html;
}

var previewCurrentScale = 1;

function applyPreviewScale(mode) {
  mode = mode || "fit-width";
  var stage = document.querySelector(".a4-preview-stage");
  var page = document.getElementById("docPreviewPrint");
  if (!stage || !page) return;

  previewScaleMode = mode;

  // Reset transform to measure true size
  page.style.transform = "none";
  var pageWidth = page.offsetWidth;
  var pageHeight = page.offsetHeight;
  if (!pageWidth || !pageHeight) return;

  var body = document.querySelector(".preview-modal-body");
  var availWidth = body ? body.clientWidth - 8 : stage.getBoundingClientRect().width;

  var scale = 1;
  if (mode === "fit-width") {
    scale = availWidth / pageWidth;
  } else if (mode === "actual") {
    scale = 1;
  } else if (typeof mode === "number") {
    scale = mode;
  } else {
    var stageRect = stage.getBoundingClientRect();
    scale = Math.min(availWidth / pageWidth, stageRect.height / pageHeight);
  }

  scale = Math.max(scale, 0.2);
  previewCurrentScale = scale;
  page.style.transform = "scale(" + scale + ")";

  // Desktop: center document; Mobile: left-align for horizontal scroll
  var isMobilePreview = window.innerWidth <= 900;
  if (isMobilePreview) {
    page.style.transformOrigin = "top left";
    stage.style.width = (pageWidth * scale) + "px";
  } else {
    page.style.transformOrigin = "top center";
    stage.style.width = "100%";
  }
  stage.style.minHeight = (pageHeight * scale) + "px";

  updateZoomLabel();
}

function zoomIn() {
  var newScale = Math.min(previewCurrentScale + 0.15, 2);
  applyPreviewScale(newScale);
}

function zoomOut() {
  var newScale = Math.max(previewCurrentScale - 0.15, 0.2);
  applyPreviewScale(newScale);
}

function zoomFitWidth() {
  applyPreviewScale("fit-width");
}

function updateZoomLabel() {
  var label = document.getElementById("zoomLabel");
  if (label) {
    label.textContent = Math.round(previewCurrentScale * 100) + "%";
  }
}

function initPreviewZoomControls() {
  var btnIn = document.getElementById("btnZoomIn");
  var btnOut = document.getElementById("btnZoomOut");
  var btnFit = document.getElementById("btnZoomFit");
  if (btnIn) btnIn.onclick = zoomIn;
  if (btnOut) btnOut.onclick = zoomOut;
  if (btnFit) btnFit.onclick = zoomFitWidth;
}

function convertToGrayscale(imgSrc, callback) {
  if (!imgSrc) { callback(imgSrc); return; }
  var img = document.createElement("img");
  if (imgSrc.indexOf("http") === 0) {
    img.crossOrigin = "anonymous";
  }
  img.onload = function() {
    try {
      var w = img.naturalWidth || img.width;
      var h = img.naturalHeight || img.height;
      if (!w || !h) { callback(imgSrc); return; }
      var canvas = document.createElement("canvas");
      canvas.width = w;
      canvas.height = h;
      var ctx = canvas.getContext("2d");
      ctx.filter = "grayscale(100%)";
      ctx.drawImage(img, 0, 0, w, h);
      var result = canvas.toDataURL("image/png");
      callback(result);
    } catch (e1) {
      try {
        var canvas2 = document.createElement("canvas");
        canvas2.width = img.naturalWidth || img.width;
        canvas2.height = img.naturalHeight || img.height;
        var ctx2 = canvas2.getContext("2d");
        ctx2.drawImage(img, 0, 0);
        var imageData = ctx2.getImageData(0, 0, canvas2.width, canvas2.height);
        var data = imageData.data;
        for (var i = 0; i < data.length; i += 4) {
          var gray = data[i] * 0.299 + data[i + 1] * 0.587 + data[i + 2] * 0.114;
          data[i] = data[i + 1] = data[i + 2] = gray;
        }
        ctx2.putImageData(imageData, 0, 0);
        callback(canvas2.toDataURL("image/png"));
      } catch (e2) {
        console.error("convertToGrayscale failed:", e2);
        callback(imgSrc);
      }
    }
  };
  img.onerror = function() {
    console.error("convertToGrayscale img load error for src length:", imgSrc.length);
    callback(imgSrc);
  };
  img.src = imgSrc;
}

function inlineExternalImages(node) {
  var imgs = node.querySelectorAll("img");
  var promises = [];
  for (var i = 0; i < imgs.length; i++) {
    var src = imgs[i].getAttribute("src") || "";
    if (src.indexOf("http") === 0) {
      (function(imgEl, imgSrc) {
        var p = runServer("fetchImageBase64Api", imgSrc).then(function(base64) {
          if (base64) imgEl.src = base64;
        }).catch(function() {});
        promises.push(p);
      })(imgs[i], src);
    }
  }
  return promises.length ? Promise.all(promises) : Promise.resolve();
}

function generatePdfFromNode(sourceNode, filename) {
  showToast("กำลังสร้างไฟล์ PDF...", { type: "info" });

  // Read CSS variables from the SOURCE node BEFORE cloning/overwriting
  var srcStyle = sourceNode.style || {};
  var resolvedAccent = (srcStyle.getPropertyValue ? srcStyle.getPropertyValue("--doc-accent").trim() : "") || "#1e5c8a";
  var resolvedSoft = (srcStyle.getPropertyValue ? srcStyle.getPropertyValue("--doc-accent-soft").trim() : "") || hexToRgba(resolvedAccent, 0.12);
  // Also check pages inside source for multi-page docs
  if (resolvedAccent === "#1e5c8a") {
    var srcPages = sourceNode.querySelectorAll(".doc-page");
    if (srcPages.length > 0 && srcPages[0].style.getPropertyValue) {
      var pgAccent = srcPages[0].style.getPropertyValue("--doc-accent").trim();
      if (pgAccent) { resolvedAccent = pgAccent; resolvedSoft = srcPages[0].style.getPropertyValue("--doc-accent-soft").trim() || hexToRgba(pgAccent, 0.12); }
    }
  }

  var container = document.createElement("div");
  container.style.cssText = "position:absolute;left:0;top:0;width:210mm;background:#fff;z-index:-9999;opacity:0;pointer-events:none;overflow:visible;";

  var clone = sourceNode.cloneNode(true);
  var pages = clone.querySelectorAll(".doc-page");
  var shrinkInner = clone.querySelector(".doc-shrink-inner");
  _pruneBlankTrailingPages(clone);
  pages = clone.querySelectorAll(".doc-page");
  if (pages.length > 0) {
    clone.style.cssText = "transform:none;width:210mm;height:" + (pages.length * 297) + "mm;margin:0;padding:0;background:#fff;overflow:hidden;";
    for (var i = 0; i < pages.length; i++) {
      pages[i].style.cssText = "width:210mm;height:297mm;padding:15mm;box-sizing:border-box;background:#fff;margin:0;position:relative;overflow:hidden;box-shadow:none;";
    }
  } else if (shrinkInner) {
    // Shrunk single page: outer is just an A4 container, inner has the transform
    clone.style.cssText = "transform:none;width:210mm;height:297mm;overflow:hidden;background:#fff;margin:0;padding:0;box-shadow:none;";
    // Keep shrinkInner's transform intact — it was set inline by generateDocPages
  } else {
    clone.style.cssText = "transform:none;width:210mm;height:297mm;padding:16mm;box-sizing:border-box;background:#fff;margin:0;position:relative;overflow:hidden;box-shadow:none;";
  }
  container.appendChild(clone);
  document.body.appendChild(container);

  // Inject hardcoded color overrides so html2canvas doesn't need to resolve CSS vars
  var styleTag = document.createElement("style");
  styleTag.textContent = _buildPdfColorOverrides(resolvedAccent, resolvedSoft);
  var colorTarget = shrinkInner || clone;
  colorTarget.insertBefore(styleTag, colorTarget.firstChild);

  inlineExternalImages(clone).then(function() {
    var opt = {
      margin: 0,
      filename: filename,
      image: { type: "jpeg", quality: 0.98 },
      html2canvas: { scale: 2, useCORS: true, letterRendering: true, width: 794, windowWidth: 794, scrollX: 0, scrollY: 0, x: 0, y: 0 },
      jsPDF: { unit: "mm", format: "a4", orientation: "portrait" },
      pagebreak: { mode: ["avoid-all"] }
    };

    var expectedPages = pages.length || 1;
    return html2pdf().set(opt).from(clone).toPdf().get('pdf').then(function(pdf) {
      // Remove blank trailing pages
      while (pdf.internal.getNumberOfPages() > expectedPages) {
        pdf.deletePage(pdf.internal.getNumberOfPages());
      }
      if (isMobileDevice()) {
        var blob = pdf.output('blob');
        var blobUrl = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = blobUrl;
        a.download = filename;
        a.style.display = 'none';
        document.body.appendChild(a);
        a.click();
        setTimeout(function() { document.body.removeChild(a); URL.revokeObjectURL(blobUrl); }, 5000);
      } else {
        pdf.save(filename);
      }
    });
  }).then(function() {
    document.body.removeChild(container);
    showToast("ดาวน์โหลด PDF สำเร็จ", { type: "success" });
  }).catch(function(err) {
    document.body.removeChild(container);
    console.error("PDF generation error:", err);
    showToast("เกิดข้อผิดพลาดในการสร้าง PDF", { type: "error" });
  });
}

        } else {

    }).then(function() {

      showToast("ดาวน์โหลด PDF สำเร็จ", { type: "success" });

          var detailLines = item.details.split("\n").filter(function(l) { return l.trim(); });

          });
        }
      } else if (showDetail) {
        rowHtml += '<tr class="doc-item-row"><td class="center">' + (i + 1) + '</td><td class="center doc-item-code">' + productCode + '</td><td class="doc-item-name">' + (item.name || "-") + '</td><td class="doc-item-desc">' + (item.description || "") + '</td><td class="center">' + (item.qty || 0) + '</td><td class="center">' + (item.unit || "-") + '</td><td class="right">' + currSym + ' ' + Number(item.price || 0).toLocaleString("en-US", {minimumFractionDigits: 2}) + '</td><td class="right doc-item-total">' + Number(lineTotal).toLocaleString("en-US", {minimumFractionDigits: 2}) + '</td></tr>';
      } else {
        rowHtml += '<tr class="doc-item-row"><td class="center">' + (i + 1) + '</td><td class="center doc-item-code">' + productCode + '</td><td class="doc-item-name">' + (item.name || "-") + '</td><td class="center">' + (item.qty || 0) + '</td><td class="center">' + (item.unit || "-") + '</td><td class="right">' + currSym + ' ' + Number(item.price || 0).toLocaleString("en-US", {minimumFractionDigits: 2}) + '</td><td class="right doc-item-total">' + Number(lineTotal).toLocaleString("en-US", {minimumFractionDigits: 2}) + '</td></tr>';
      }
    }
    itemRowsArray.push(rowHtml);
    itemAmountsArray.push(rowAmount);
  });

  if (!items.length) {
    var emptyColspan = isBill ? 5 : ((!isServiceMode && !showDetail) ? 7 : 8);
    itemRowsArray.push('<tr><td colspan="' + emptyColspan + '" class="doc-items-empty">' + L.noItems + '</td></tr>');
  }

  // Read saved financial fields from json or doc header
  var showTotalDiscount = json.discountEnabled || doc.discountEnabled || false;
  var totalDiscountValue = Number(json.discountValue) || Number(doc.discountValue) || 0;
  var totalDiscountType = json.discountType || doc.discountType || "percent";
  var savedTotalDiscount = Number(json.totalDiscount) || 0;
  var showVat = json.vatEnabled || doc.vatEnabled || false;
  var vatRate = Number(json.vatRate) || Number(doc.vatRate) || 7;
  var showWht = json.whtEnabled || doc.whtEnabled || false;
  var whtRate = Number(json.whtRate) || Number(doc.whtRate) || 3;
  var showSignature = json.signatureEnabled !== undefined ? json.signatureEnabled : (doc.signatureEnabled !== undefined ? doc.signatureEnabled : false);
  var signatureName = json.signatureName || "";
  var signatureImage = json.signatureImage || "";
  var showStamp = json.stampEnabled || false;
  var stampImage = json.stampImage || "";
  var termsText = json.termsText || doc.terms || "";
  var showTermsAndConditions = json.showTermsAndConditions !== undefined ? json.showTermsAndConditions : config.showTermsAndConditions;
  var showPaymentTerms = json.showPaymentTerms || false;
  var paymentTermsLabel = json.paymentTermsLabel || "";

  // Calculate totals
  var afterItemDiscount = subtotal;
  var totalDiscount = 0;
  if (showTotalDiscount && totalDiscountValue > 0) {
    if (totalDiscountType === "percent") {
      totalDiscount = afterItemDiscount * (totalDiscountValue / 100);
    } else {
      totalDiscount = totalDiscountValue;
    }
  }
  if (savedTotalDiscount > 0 && totalDiscount === 0) {
    totalDiscount = savedTotalDiscount;
  }
  var afterDiscount = Number(json.afterDiscount) || (afterItemDiscount - totalDiscount);
  var vatInclusive = json.vatInclusive || false;
  var vatAmount = 0;
  if (showVat && !vatInclusive) {
    vatAmount = Number(json.vatAmount) || Number(doc.vatAmount) || (afterDiscount * vatRate / 100);
  }
  var whtAmount = showWht ? (Number(json.whtAmount) || Number(doc.whtAmount) || (afterDiscount * whtRate / 100)) : 0;
  var customFeeEnabled = json.customFeeEnabled || false;
  var customFeeName = json.customFeeName || "ค่าใช้จ่ายเพิ่มเติม";
  var customFeeAmount = customFeeEnabled ? (Number(json.customFeeAmount) || 0) : 0;
  var grandTotal = json.grandTotal || doc.grandTotal || (vatInclusive ? (afterDiscount - whtAmount + customFeeAmount) : (afterDiscount + vatAmount - whtAmount + customFeeAmount));
  var grandTotalNum = Number(grandTotal) || 0;

  var totalDiscountAmount = Math.abs(itemDiscountTotal) + Math.abs(totalDiscount);
  var savedDiscountType = json.discountType || doc.discountType || "percent";
  var savedDiscountValue = Number(json.discountValue || doc.discountValue) || 0;
  var discountLabel = L.discount;

  var watermarkHtml = '<div class="doc-watermark" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-35deg);width:280px;height:280px;z-index:0;pointer-events:none;display:flex;align-items:center;justify-content:center;"><img src="' + stampImage + '" style="max-width:100%;max-height:100%;object-fit:contain;opacity:0.07;" /></div>';
  var badgeHtml = '<div class="doc-badge"><span>' + L.copyBadge + '</span></div>';

  var companyDisplayName2 = (company.name || L.companyFallback) + (companyJson.isHeadOffice ? ' (\u0e2a\u0e33\u0e19\u0e31\u0e01\u0e07\u0e32\u0e19\u0e43\u0e2b\u0e0d\u0e48)' : '');
  var headerHtml = '<div class="doc-header"><div class="doc-brand"><div class="doc-logo">';
  headerHtml += companyJson.logo ? ('<img src="' + companyJson.logo + '" alt="logo" />') : '<span class="doc-logo-fallback">🏢</span>';
  headerHtml += '</div><div class="doc-company"><div class="doc-company-name">' + companyDisplayName2 + '</div>';
  headerHtml += '<div class="doc-company-meta">' + (company.address || "") + '<br/>' + L.phone + ': ' + formatPhone(company.phone) + ' | ' + (company.email || "") + '<br/>' + L.taxId + ': ' + (company.taxId || "") + '</div></div></div>';
  headerHtml += '<div class="doc-title"><div class="doc-title-th">' + docTitle + '</div><div class="doc-title-en">' + docTitleEN + '</div></div></div>';

  var partiesHtml = '<div class="doc-parties">';
  partiesHtml += '<div class="doc-customer-info">';
  partiesHtml += '<div class="doc-ci-header">' + partyLabel + '</div>';
  partiesHtml += '<div class="doc-ci-name">' + customerName + '</div>';
  partiesHtml += '<div class="doc-ci-detail">' + customerAddress + '</div>';
  var ciContact2 = [];

  var contactPerson2 = json.contactPerson || '';
  if (contactPerson2) partiesHtml += '<div class="doc-ci-detail">\u0e1c\u0e39\u0e49\u0e15\u0e34\u0e14\u0e15\u0e48\u0e2d: ' + contactPerson2 + '</div>';
  partiesHtml += '</div>';
  partiesHtml += '<div class="doc-meta"><table class="doc-meta-table">';
  partiesHtml += '<tr><td class="doc-meta-label">' + L.docNoLabel + '</td><td class="doc-meta-value">' + docNo + '</td></tr>';
  partiesHtml += '<tr><td class="doc-meta-label">' + L.date + '</td><td class="doc-meta-value">' + formatDocDate(docDate) + '</td></tr>';
  if ((config.showDueDate || config.showValidUntil) && dueDate) {
    partiesHtml += '<tr><td class="doc-meta-label">' + (config.showValidUntil ? L.validUntil : L.dueDate) + '</td><td class="doc-meta-value">' + formatDocDate(dueDate) + '</td></tr>';

  if (!config.showVendor && salespersonName) {
    partiesHtml += '<tr><td class="doc-meta-label">' + L.salespersonLabel + '</td><td class="doc-meta-value">' + salespersonName + '</td></tr>';
  }
  partiesHtml += '</table></div>';
  partiesHtml += '</div>';
  var customerHtml = partiesHtml;
  var metaHtml = '';

  var tableOpenHtml;
  if (isBill) {
    tableOpenHtml = '<table class="doc-items-table"><thead><tr><th class="center" style="width: 40px;">#</th><th>เลขที่เอกสาร</th><th class="center" style="width: 100px;">วันที่</th><th class="center" style="width: 100px;">วันครบกำหนด</th><th class="right" style="width: 110px;">จำนวนเงิน</th></tr></thead><tbody>';
  } else if (isServiceMode) {
    tableOpenHtml = '<table class="doc-items-table"><thead><tr><th class="center" style="width: 40px;">#</th><th colspan="3">' + L.descCol + '</th><th class="center" style="width: 60px;">' + L.qtyCol + '</th><th class="center" style="width: 60px;">' + L.unitCol + '</th><th class="right" style="width: 90px;">' + L.unitPriceCol + '</th><th class="right" style="width: 90px;">' + L.amountCol + '</th></tr></thead><tbody>';
  } else if (showDetail) {
    tableOpenHtml = '<table class="doc-items-table"><thead><tr><th class="center" style="width: 40px;">#</th><th class="center" style="width: 70px;">' + L.codeCol + '</th><th>' + L.descCol + '</th><th>' + L.detailCol + '</th><th class="center" style="width: 60px;">' + L.qtyCol + '</th><th class="center" style="width: 60px;">' + L.unitCol + '</th><th class="right" style="width: 90px;">' + L.unitPriceCol + '</th><th class="right" style="width: 90px;">' + L.totalCol + '</th></tr></thead><tbody>';
  } else {
    tableOpenHtml = '<table class="doc-items-table"><thead><tr><th class="center" style="width: 40px;">#</th><th class="center" style="width: 70px;">' + L.codeCol + '</th><th>' + L.descCol + '</th><th class="center" style="width: 60px;">' + L.qtyCol + '</th><th class="center" style="width: 60px;">' + L.unitCol + '</th><th class="right" style="width: 90px;">' + L.unitPriceCol + '</th><th class="right" style="width: 90px;">' + L.totalCol + '</th></tr></thead><tbody>';
  }

  var summaryHtml = '<div class="doc-summary"><div class="doc-summary-left">';
  if (showTermsAndConditions && termsTextHtml) {
    summaryHtml += '<div class="doc-terms"><div class="doc-terms-title">' + L.termsAndConditions + '</div><div class="doc-terms-body">' + termsTextHtml + '</div></div>';
  }
  if (config.showPaymentInfo && bankInfo) {
    summaryHtml += '<div class="doc-payment-block"><div class="doc-payment-title">' + L.paymentTitle + '</div>' + bankInfo + '</div>';
  }
  summaryHtml += '</div>';
  summaryHtml += '<div class="doc-totals"><table class="doc-totals-table">';
  if (isBill) {
    // BILL mode: aggregate financial details from saved invoice items
    var billSubtotal = 0, billDiscount = 0, billBeforeTax = 0, billVat = 0, billWht = 0, billGrand = 0;
    var billHasDiscount = false, billHasVat = false, billHasWht = false;
    items.forEach(function(item) {
      billSubtotal += Number(item.invSubtotal) || Number(item.price) || 0;
      billDiscount += Number(item.invDiscountAmount) || 0;
      billBeforeTax += Number(item.invTotalBeforeTax) || Number(item.price) || 0;
      billVat += Number(item.invVatAmount) || 0;
      billWht += Number(item.invWhtAmount) || 0;
      billGrand += Number(item.price) || 0;
      if (Number(item.invDiscountAmount) > 0) billHasDiscount = true;
      if (item.invVatEnabled || Number(item.invVatAmount) > 0) billHasVat = true;
      if (item.invWhtEnabled || Number(item.invWhtAmount) > 0) billHasWht = true;
    });
    summaryHtml += '<tr><td>' + L.subtotal + '</td><td class="value">' + Number(billSubtotal).toLocaleString("en-US", {minimumFractionDigits: 2}) + '</td></tr>';
    if (billHasDiscount) {
      summaryHtml += '<tr><td>' + L.discount + '</td><td class="value">-' + Number(billDiscount).toLocaleString("en-US", {minimumFractionDigits: 2}) + '</td></tr>';
      summaryHtml += '<tr><td>' + L.afterDiscount + '</td><td class="value">' + Number(billBeforeTax).toLocaleString("en-US", {minimumFractionDigits: 2}) + '</td></tr>';
    }
    if (billHasVat) {
      summaryHtml += '<tr><td>VAT (จากใบแจ้งหนี้)</td><td class="value">' + Number(billVat).toLocaleString("en-US", {minimumFractionDigits: 2}) + '</td></tr>';
    }
    if (billHasWht) {
      summaryHtml += '<tr><td>หัก ณ ที่จ่าย (จากใบแจ้งหนี้)</td><td class="value">-' + Number(billWht).toLocaleString("en-US", {minimumFractionDigits: 2}) + '</td></tr>';
    }
    summaryHtml += '<tr class="total"><td>' + L.grandTotal + '</td><td class="value">' + Number(billGrand).toLocaleString("en-US", {minimumFractionDigits: 2}) + '</td></tr>';
  } else {
    summaryHtml += '<tr><td>' + L.subtotal + '</td><td class="value">' + Number(subtotal).toLocaleString("en-US", {minimumFractionDigits: 2}) + '</td></tr>';
    if (hasAnyDiscount) {
      summaryHtml += '<tr><td>' + discountLabel + '</td><td class="value">-' + Number(totalDiscountAmount).toLocaleString("en-US", {minimumFractionDigits: 2}) + '</td></tr>';
      summaryHtml += '<tr><td>' + L.afterDiscount + '</td><td class="value">' + Number(afterDiscount).toLocaleString("en-US", {minimumFractionDigits: 2}) + '</td></tr>';
    }
    if (showVat) {
      if (vatInclusive) {
        var vatRateNum = parseFloat(vatRate) || 7;
        var baseForVat = hasAnyDiscount ? afterDiscount : subtotal;
        var beforeTax = baseForVat / (1 + vatRateNum / 100);
        var vatSeparated = baseForVat - beforeTax;
        summaryHtml += '<tr><td>' + L.beforeTax + '</td><td class="value">' + Number(beforeTax).toLocaleString("en-US", {minimumFractionDigits: 2}) + '</td></tr>';
        summaryHtml += '<tr><td>' + L.vat + ' (' + vatRateNum + '%)</td><td class="value">' + Number(vatSeparated).toLocaleString("en-US", {minimumFractionDigits: 2}) + '</td></tr>';
      } else {
        summaryHtml += '<tr><td>' + L.vat + ' (' + vatRate + '%)</td><td class="value">' + Number(vatAmount).toLocaleString("en-US", {minimumFractionDigits: 2}) + '</td></tr>';
      }
    }
    if (showWht) {
      summaryHtml += '<tr><td>' + L.wht + ' (' + whtRate + '%)</td><td class="value">-' + Math.abs(whtAmount).toLocaleString("en-US", {minimumFractionDigits: 2}) + '</td></tr>';
    }
    if (customFeeEnabled && customFeeAmount > 0) {
      summaryHtml += '<tr><td>' + customFeeName + '</td><td class="value">' + Number(customFeeAmount).toLocaleString("en-US", {minimumFractionDigits: 2}) + '</td></tr>';
    }
    summaryHtml += '<tr class="total"><td>' + L.grandTotal + '</td><td class="value">' + Number(grandTotalNum).toLocaleString("en-US", {minimumFractionDigits: 2}) + '</td></tr>';
  }
  summaryHtml += '</table></div></div>';
  if (grandTotalText) {
    summaryHtml += '<div class="doc-amount-words-bar">( ' + grandTotalText + ' )</div>';
  }
  if (showPaymentTerms && paymentTermsLabel) {
    summaryHtml += '<div class="doc-payment-terms-line"><strong>' + L.paymentTerms + ':</strong> ' + paymentTermsLabel + '</div>';
  }
  if (showSignature) {
    var issuerSignImg = signatureImage ? '<div class="doc-signature-image"><img src="' + signatureImage + '" /></div>' : '<div style="min-height: 50px;"></div>';
    var issuerName = signatureName ? '( ' + signatureName + ' )' : '(&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;)';
    var signDateStr = json.signatureDate || "";
    var signDateDisplay = signDateStr ? formatDocDate(signDateStr) : "____/____/________";
    var receiverTitle = (docType === "RCPT" && L.receiverOfRCPT) ? L.receiverOfRCPT : (L.receiverOf + ' ' + docTitle);
    var issuerTitle = (docType === "RCPT" && L.issuerOfRCPT) ? (L.issuerOfRCPT) : (L.issuerOf + ' ' + docTitle);
    summaryHtml += '<div class="doc-signature">';
    summaryHtml += '<div class="doc-signature-block"><div class="doc-signature-title">' + receiverTitle + '</div><div style="min-height: 50px;"></div><div class="doc-signature-line"><div class="doc-signature-name">(&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;)</div><div class="doc-signature-date">' + L.dateSigned + ' ____/____/________</div></div></div>';
    summaryHtml += '<div class="doc-signature-block"><div class="doc-signature-title">' + issuerTitle + '</div>' + issuerSignImg + '<div class="doc-signature-line"><div class="doc-signature-name">' + issuerName + '</div><div class="doc-signature-date">' + L.dateSigned + ' ' + signDateDisplay + '</div></div></div>';
    summaryHtml += '</div>';
  }
  if (docNote) {
    var noteLines = docNote.split("\n").map(function(l) { return l.trim(); }).filter(Boolean).join("<br>");
    summaryHtml += '<div class="doc-note-footer"><strong>' + L.notes + ':</strong><br>' + noteLines + '</div>';
  }

  var tableColspan = isBill ? 5 : (isServiceMode ? 8 : (showDetail ? 8 : 7));

  return generateDocPages({
    themeColor: themeColor, accentSoft: accentSoft, L: L,
    showStamp: showStamp, stampImage: stampImage,
    watermarkHtml: watermarkHtml, badgeHtml: badgeHtml,
    headerHtml: headerHtml, metaHtml: metaHtml, customerHtml: customerHtml,
    itemsTitle: isBill ? "รายการใบแจ้งหนี้" : L.itemsTitle, tableOpenHtml: tableOpenHtml,
    itemRows: itemRowsArray, itemAmounts: itemAmountsArray,
    tableColspan: tableColspan, currSym: currSym,
    summaryHtml: summaryHtml
  });
}

function openPreviewFromDoc(doc) {
  var modal = document.getElementById("previewModal");
  if (!modal) return;
  modal.style.display = "flex";

  var content = document.getElementById("previewContent");
  if (!content) return;

  content.innerHTML = '<div class="a4-preview-stage">' + generatePreviewFromDoc(doc) + '</div>';

  requestAnimationFrame(function() { applyPreviewScale("fit-width"); });
  if (!previewScaleBound) {
    window.addEventListener("resize", function() { applyPreviewScale(previewScaleMode); });
    previewScaleBound = true;
  }
}

function loadDocumentForPreview(doc) {
  if (typeof doc.json === "string") {
    try { doc.json = JSON.parse(doc.json); } catch(e) { doc.json = {}; }
  }
  var json = doc.json || {};
  var docType = doc.docType || doc.type || "QUO";
  
  var setVal = function(id, val) { var el = document.getElementById(id); if (el) el.value = val; };
  var setChecked = function(id, val) { var el = document.getElementById(id); if (el) el.checked = !!val; };
  var showEl = function(id, show) { var el = document.getElementById(id); if (el) el.style.display = show ? "block" : "none"; };
  var showFlex = function(id, show) { var el = document.getElementById(id); if (el) el.style.display = show ? "flex" : "none"; };

  setVal("docTypeSelect", docType);
  setVal("docNoInput", doc.docNo || "");
  setVal("docDateInput", doc.docDate || "");
  setVal("docDueDateInput", doc.dueDate || "");
  setVal("docCustomerName", json.customerName || "");
  setVal("docCustomerTaxId", json.customerTaxId || "");
  setVal("docCustomerAddress", json.customerAddress || "");
  setVal("docCustomerPhone", json.customerPhone || "");
  setVal("docCustomerEmail", json.customerEmail || "");
  setVal("docNote", json.note || "");

  // Restore discount settings
  var discountEnabled = json.discountEnabled || doc.discountEnabled || false;
  setChecked("docOptDiscount", discountEnabled);
  setVal("docDiscountValue", json.discountValue || doc.discountValue || 0);
  setVal("docDiscountType", json.discountType || doc.discountType || "percent");
  showEl("docDiscountSection", discountEnabled);
  showFlex("docTotalDiscountRow", discountEnabled);

  // Restore VAT settings
  var vatEnabled = json.vatEnabled || doc.vatEnabled || false;
  setChecked("docOptVat", vatEnabled);
  setVal("docVatRate", json.vatRate || doc.vatRate || 7);
  showEl("docVatSection", vatEnabled);
  showFlex("docVatRow", vatEnabled);

  // Restore VAT-inclusive setting
  setChecked("docOptVatInc", json.vatInclusive || false);

  // Restore WHT settings
  var whtEnabled = json.whtEnabled || doc.whtEnabled || false;
  setChecked("docOptWht", whtEnabled);
  setVal("docWhtRate", json.whtRate || doc.whtRate || 3);
  showEl("docWhtSection", whtEnabled);
  showFlex("docWhtRow", whtEnabled);

  // Restore custom fee settings
  var customFeeEnabled = json.customFeeEnabled || false;
  setChecked("docOptCustomFee", customFeeEnabled);
  setVal("docCustomFeeName", json.customFeeName || "");
  setVal("docCustomFeeAmount", json.customFeeAmount || 0);
  showEl("docCustomFeeSection", customFeeEnabled);
  showFlex("docCustomFeeRow", customFeeEnabled);

  // Restore signature
  var sigEnabled = json.signatureEnabled !== undefined ? json.signatureEnabled : (doc.signatureEnabled || false);
  setChecked("docOptSign", sigEnabled);
  showEl("docSignatureSection", sigEnabled);
  showEl("docSignDateSection", sigEnabled);
  setVal("docSignName", json.signatureName || "");
  setVal("docSignDate", json.signatureDate || "");
  docState.signatureImage = json.signatureImage || "";
  var docSignPreview = document.getElementById("docSignPreview");
  var btnRemoveSign = document.getElementById("btnRemoveSign");
  if (docSignPreview) {
    if (json.signatureImage) {
      docSignPreview.innerHTML = '<img src="' + json.signatureImage + '" style="max-width: 100%; max-height: 100%; object-fit: contain;" />';
      if (btnRemoveSign) btnRemoveSign.style.display = "block";
    } else {
      docSignPreview.innerHTML = '<span style="font-size: 11px; color: #9ca3af;">ยังไม่มีลายเซ็น</span>';
      if (btnRemoveSign) btnRemoveSign.style.display = "none";
    }
  }

  // Restore stamp/watermark
  var stampEnabled = json.stampEnabled || false;
  setChecked("docOptStamp", stampEnabled);
  showEl("docStampSection", stampEnabled);
  if (json.stampSource === "custom") {
    var stampSourceCustomEl = document.getElementById("stampSourceCustom");
    if (stampSourceCustomEl) stampSourceCustomEl.checked = true;
    showEl("docStampUploadWrap", true);
  }
  var docStampPreview = document.getElementById("docStampPreview");
  var btnRemoveStamp = document.getElementById("btnRemoveStamp");
  if (json.stampImage) {
    convertToGrayscale(json.stampImage, function(graySrc) {
      docState.stampImage = graySrc;
      if (docStampPreview) {
        docStampPreview.innerHTML = '<img src="' + graySrc + '" style="max-width: 100%; max-height: 100%; object-fit: contain;" />';
        if (btnRemoveStamp && json.stampSource === "custom") btnRemoveStamp.style.display = "block";
      }
    });
  } else {
    docState.stampImage = "";
    if (docStampPreview) {
      docStampPreview.innerHTML = '<span style="font-size: 11px; color: #9ca3af;">ไม่มีรูป</span>';
    }
  }

  // Restore terms & conditions
  var showTerms = json.showTermsAndConditions !== undefined ? json.showTermsAndConditions : true;
  setChecked("docOptTerms", showTerms);
  showEl("docTermsTextWrapper", showTerms);
  setVal("docTermsText", json.termsText || doc.terms || "");

  // Restore payment terms
  if (json.showPaymentTerms) {
    setChecked("docOptPaymentTerms", true);
    setVal("docPaymentTerms", json.paymentTerms || "");
    if (json.paymentTerms === "custom") {
      setVal("docPaymentTermsCustom", json.paymentTermsCustom || "");
      showEl("docPaymentTermsCustom", true);
    }
  }

  // Restore detail column visibility
  var detailEnabled = json.showDetail !== undefined ? json.showDetail : true;
  setChecked("docOptDetail", detailEnabled);

  // Restore item mode
  docState.itemMode = json.itemMode || "product";
  docState.items = json.items || [];
  renderDocItems();
  recalculateDocTotals();

  // Trigger doc type change to update UI sections
  var docTypeSelect = document.getElementById("docTypeSelect");
  if (docTypeSelect) {
    docTypeSelect.dispatchEvent(new Event("change"));
  }
}

function exportSelectedDocsPDF() {
  var checkboxes = document.querySelectorAll(".doc-checkbox:checked");
  if (!checkboxes.length) {
    showToast("กรุณาเลือกเอกสารที่ต้องการส่งออก", { type: "warning" });
    return;
  }
  
  var docIds = Array.from(checkboxes).map(function(cb) { return cb.value; });
  showToast("กำลังเตรียมส่งออก " + docIds.length + " เอกสาร...", { type: "info" });
}

</script>
