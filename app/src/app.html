<!doctype html>
<html lang="th">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
		<meta name="theme-color" content="#1a4731" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
		<link rel="manifest" href="/manifest.json" />
		<link rel="apple-touch-icon" href="/icons/icon-192.png" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="default" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=Noto+Sans+Thai:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
		<script>
			(function(){
				var themes={blue:'#1f3a5f',indigo:'#3730a3',slate:'#334155',teal:'#115e59',purple:'#5b21b6'};
				var t=localStorage.getItem('ui.theme')||'blue';
				var c=themes[t]||themes.blue;
				var s=document.documentElement.style;
				s.setProperty('--color-primary',c);
				s.setProperty('--color-primary-soft','rgba('+parseInt(c.slice(1,3),16)+','+parseInt(c.slice(3,5),16)+','+parseInt(c.slice(5,7),16)+',0.12)');
				s.setProperty('--color-primary-hover','rgba('+parseInt(c.slice(1,3),16)+','+parseInt(c.slice(3,5),16)+','+parseInt(c.slice(5,7),16)+',0.85)');
				s.setProperty('--color-accent',c);
				s.setProperty('--color-accent-soft','rgba('+parseInt(c.slice(1,3),16)+','+parseInt(c.slice(3,5),16)+','+parseInt(c.slice(5,7),16)+',0.12)');
				var fonts={sarabun:"'Sarabun', sans-serif",noto:"'Noto Sans Thai', sans-serif",ibm:"'IBM Plex Sans Thai', sans-serif"};
				var f=localStorage.getItem('ui.font')||'sarabun';
				s.setProperty('--font-body',fonts[f]||fonts.sarabun);
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
		<script>
			// Force reload when new SW activates — ensures PWA standalone gets fresh code
			if ('serviceWorker' in navigator) {
				navigator.serviceWorker.addEventListener('controllerchange', function() {
					window.location.reload();
				});
			}
		</script>
	</body>
</html>
