<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grid Doc — ล้างแคช</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
  .card { background: #1e293b; border-radius: 16px; padding: 32px; max-width: 400px; width: 100%; text-align: center; }
  h1 { font-size: 20px; margin-bottom: 12px; }
  p { font-size: 14px; color: #94a3b8; margin-bottom: 20px; line-height: 1.6; }
  #status { font-size: 14px; color: #38bdf8; min-height: 20px; margin-bottom: 16px; }
  .btn { display: inline-block; background: #3b82f6; color: #fff; border: none; border-radius: 8px; padding: 12px 24px; font-size: 16px; cursor: pointer; text-decoration: none; }
  .btn:hover { background: #2563eb; }
  .btn-green { background: #22c55e; }
  .btn-green:hover { background: #16a34a; }
</style>
</head>
<body>
<div class="card">
  <h1>ล้างแคชและ Service Worker</h1>
  <p>หากเข้าแอปไม่ได้ กดปุ่มด้านล่างเพื่อล้างแคชแล้วเข้าใหม่</p>
  <div id="status"></div>
  <button class="btn" id="clearBtn" onclick="clearAll()">ล้างแคชทั้งหมด</button>
</div>
<script>
async function clearAll() {
  var status = document.getElementById('status');
  var btn = document.getElementById('clearBtn');
  btn.disabled = true;
  btn.textContent = 'กำลังล้าง...';
  status.textContent = 'กำลังลบ Service Worker...';

  try {
    // Unregister all service workers
    if ('serviceWorker' in navigator) {
      var registrations = await navigator.serviceWorker.getRegistrations();
      for (var reg of registrations) {
        await reg.unregister();
      }
      status.textContent = 'ลบ SW สำเร็จ (' + registrations.length + ')... กำลังล้างแคช...';
    }

    // Delete all caches
    var keys = await caches.keys();
    for (var key of keys) {
      await caches.delete(key);
    }
    status.textContent = 'ล้างแคชสำเร็จ (' + keys.length + ' caches)';

    // Clear IndexedDB
    if (indexedDB.databases) {
      var dbs = await indexedDB.databases();
      for (var db of dbs) {
        if (db.name) indexedDB.deleteDatabase(db.name);
      }
    }

    status.textContent = 'เสร็จสิ้น! กำลังเปลี่ยนหน้า...';
    btn.textContent = 'สำเร็จ!';
    btn.className = 'btn btn-green';

    // Redirect to app after short delay
    setTimeout(function() { window.location.href = '/'; }, 1500);
  } catch (e) {
    status.textContent = 'Error: ' + e.message;
    btn.disabled = false;
    btn.textContent = 'ลองอีกครั้ง';
  }
}
</script>
</body>
</html>
