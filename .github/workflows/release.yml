name: Build Tauri App (macOS + Windows)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.2.0)'
        required: true
        type: string
  push:
    tags:
      - 'v*'

env:
  APP_DIR: app

jobs:
  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - name: Install frontend deps
        working-directory: ${{ env.APP_DIR }}
        run: npm ci

      - name: Build Tauri (aarch64)
        working-directory: ${{ env.APP_DIR }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        run: npx tauri build --target aarch64-apple-darwin

      - name: Build Tauri (x86_64)
        working-directory: ${{ env.APP_DIR }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        run: npx tauri build --target x86_64-apple-darwin

      - name: Collect macOS artifacts
        run: |
          mkdir -p artifacts/macos
          # aarch64
          cp app/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg artifacts/macos/ 2>/dev/null || true
          cp app/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.tar.gz artifacts/macos/ 2>/dev/null || true
          cp app/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.tar.gz.sig artifacts/macos/ 2>/dev/null || true
          # x86_64
          cp app/src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg artifacts/macos/ 2>/dev/null || true
          cp app/src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.tar.gz artifacts/macos/ 2>/dev/null || true
          cp app/src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.tar.gz.sig artifacts/macos/ 2>/dev/null || true
          ls -la artifacts/macos/

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-builds
          path: artifacts/macos/
          retention-days: 30

  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - name: Install frontend deps
        working-directory: ${{ env.APP_DIR }}
        run: npm ci

      - name: Build Tauri (Windows)
        working-directory: ${{ env.APP_DIR }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        run: npx tauri build

      - name: Collect Windows artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/windows
          # NSIS installer (.exe)
          Copy-Item "app/src-tauri/target/release/bundle/nsis/*.exe" "artifacts/windows/" -ErrorAction SilentlyContinue
          # Update bundle (.nsis.zip + .nsis.zip.sig)
          Copy-Item "app/src-tauri/target/release/bundle/nsis/*.nsis.zip" "artifacts/windows/" -ErrorAction SilentlyContinue
          Copy-Item "app/src-tauri/target/release/bundle/nsis/*.nsis.zip.sig" "artifacts/windows/" -ErrorAction SilentlyContinue
          Get-ChildItem "artifacts/windows/"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: artifacts/windows/
          retention-days: 30

  create-release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-builds
          path: artifacts/macos

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-builds
          path: artifacts/windows

      - name: List all artifacts
        run: |
          echo "=== macOS ==="
          ls -la artifacts/macos/ 2>/dev/null || echo "No macOS artifacts"
          echo "=== Windows ==="
          ls -la artifacts/windows/ 2>/dev/null || echo "No Windows artifacts"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version || github.ref_name }}
          name: Grid Pro v${{ github.event.inputs.version || github.ref_name }}
          draft: true
          generate_release_notes: true
          files: |
            artifacts/macos/*
            artifacts/windows/*
